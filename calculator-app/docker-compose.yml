version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: calculator
      PGUSER: calculator_user
      PGPASSWORD: calculator_pass
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: calculator
      POSTGRES_USER: calculator_user
      POSTGRES_PASSWORD: calculator_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db-init/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calculator_user -d calculator"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
